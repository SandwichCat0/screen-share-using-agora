<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDShare 屏幕共享观看</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f11;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── 顶部栏 ───────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(15,15,17,.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    #topbar .logo { font-size: 13px; font-weight: 600; color: #a78bfa; letter-spacing: .05em; }
    #topbar .meta { font-size: 11px; color: #6b7280; }
    #statusBadge {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
      transition: all .3s;
    }
    .badge-connecting { background:#1e3a5f; color:#60a5fa; }
    .badge-live       { background:#14302a; color:#34d399; }
    .badge-ended      { background:#2a1a1a; color:#f87171; }
    .badge-error      { background:#2a1a1a; color:#f87171; }

    /* ── 主视频区 ──────────────────────────── */
    #stage {
      width: 100%;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 44px;
    }

    #videoWrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    #videoWrap.hidden { display: none; }

    /* Agora SDK 内部会注入 div>video，给它设尺寸 */
    #videoWrap > div {
      width: 100% !important;
      height: 100% !important;
    }
    #videoWrap video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── 占位卡片 ───────────────────────────── */
    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
      max-width: 340px;
    }
    #placeholder.hidden { display: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(167,139,250,.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #placeholder .icon-big {
      font-size: 48px;
      line-height: 1;
    }
    #phTitle   { font-size: 18px; font-weight: 600; }
    #phSubtitle { font-size: 13px; color: #6b7280; line-height: 1.6; }

    /* ── 底部网络质量条 ──────────────────────── */
    #netbar {
      position: fixed;
      bottom: 12px; right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      color: #6b7280;
      background: rgba(15,15,17,.7);
      backdrop-filter: blur(6px);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.07);
      transition: opacity .3s;
    }
    #netbar.hidden { opacity: 0; pointer-events: none; }
    .net-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34d399;
      transition: background .5s;
    }
    .net-dot.warn   { background: #fbbf24; }
    .net-dot.bad    { background: #f87171; }

    /* ── 底部控制栏 ──────────────────────── */
    #toolbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(15,15,17,.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    #toolbar.visible { opacity: 1; pointer-events: auto; }

    .tb-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .2s;
      font-size: 16px;
      color: #e5e5e5;
      background: rgba(255,255,255,.1);
    }
    .tb-btn:hover { background: rgba(255,255,255,.2); }
    .tb-btn:active { transform: scale(.92); }
    .tb-btn.active { background: #22c55e; color: #fff; }
    .tb-btn.danger { background: #ef4444; color: #fff; }
    .tb-btn.danger:hover { background: #dc2626; }
    .tb-btn:disabled { opacity: .5; cursor: not-allowed; }

    .tb-btn svg {
      width: 18px; height: 18px;
      fill: currentColor;
    }

    /* 全屏时完全隐藏所有控件 + 鼠标 */
    :fullscreen #topbar,
    :fullscreen #toolbar,
    :fullscreen #netbar { display: none !important; }
    :fullscreen { cursor: none; }
    :fullscreen.show-cursor { cursor: default; }
  </style>
</head>
<body>

  <!-- 顶部栏 -->
  <div id="topbar">
    <span class="logo">MDShare</span>
    <span id="statusBadge" class="badge-connecting">正在连接…</span>
    <span class="meta" id="channelMeta"></span>
  </div>

  <!-- 视频区 -->
  <div id="stage">
    <div id="videoWrap" class="hidden"></div>

    <div id="placeholder">
      <div class="spinner" id="phSpinner"></div>
      <p class="icon-big hidden" id="phIcon"></p>
      <p id="phTitle">正在连接</p>
      <p id="phSubtitle">正在获取频道凭据，请稍候…</p>
    </div>
  </div>

  <!-- 网络质量 -->
  <div id="netbar" class="hidden">
    <div class="net-dot" id="netDot"></div>
    <span id="netLabel">网络良好</span>
  </div>

  <!-- 底部控制栏（连接成功后显示） -->
  <div id="toolbar">
    <!-- 麦克风 -->
    <button id="btnMic" class="tb-btn" title="开启麦克风">
      <svg id="micOff" viewBox="0 0 24 24"><path d="M19 11c0 1.19-.34 2.3-.9 3.28l-1.23-1.23c.27-.62.43-1.31.43-2.05H19zm-4.02.22c0-.76-.43-1.43-1.05-1.76L13.93 9.46c0-.16.07-.32.07-.46V5c0-1.1-.9-2-2-2s-2 .9-2 2v.17l4.98 4.98v1.07zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/></svg>
      <svg id="micOn" style="display:none" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <!-- 全屏 -->
    <button id="btnFullscreen" class="tb-btn" title="全屏">
      <svg id="fsExpand" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      <svg id="fsCompress" style="display:none" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
    </button>
  </div>

  <!-- Agora Web SDK 4.22 from CDN（与客户端版本一致） -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
  <script src="/watch.js"></script>
</body>
</html>
